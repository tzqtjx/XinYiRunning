name: Build iOS IPA

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Build iOS App
        run: |
          dotnet build RecordTableApp.csproj \
            -f net8.0-ios \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:CodesignKey="" \
            -p:CodesignProvision=""

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: XinYiRunning.iOS
          path: bin/Release/net8.0-ios/ios-arm64/*.app
          if-no-files-found: warn
