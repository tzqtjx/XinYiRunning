name: Build iOS IPA

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install .NET 8 MAUI workload
        run: |
          dotnet workload install maui --version 8.0.100

      - name: Build IPA
        run: |
          dotnet publish RecordTableApp.csproj \
            -f net8.0-ios \
            -c Release \
            -p:ArchiveOnBuild=true \
            -p:RuntimeIdentifier=ios-arm64

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: XinYiRunning.iOS
          path: bin/Release/net8.0-ios/publish/*.ipa
          if-no-files-found: warn
